services:
  # 1. Banco de Dados
  db:
    image: postgres:15-alpine
    container_name: bolao_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Esse mapeamento roda o script SQL automaticamente na primeira vez
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 

  # 2. Backend (API)
  backend:
    build: ./backend
    container_name: bolao_backend
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - db

  # 3. Frontend (Interface)
  frontend:
    build: ./frontend
    container_name: bolao_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  pgdata: